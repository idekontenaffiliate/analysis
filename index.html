<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Efata Terpadu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="light-mode">

    <div id="login-view" class="view active">
        <div class="login-card">
            <h2><i class="fas fa-church"></i> Portal Efata</h2>
            <input type="text" id="login-user" placeholder="Username">
            <input type="password" id="login-pass" placeholder="Password">
            <button onclick="app.login()" class="btn-primary">Masuk</button>
            <p id="login-error" class="text-error"></p>
        </div>
    </div>

    <div id="app-view" class="view">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-brand">Efata App</div>
            <ul id="menu-list"></ul>
        </aside>

        <main class="main-layout">
            <header class="topbar">
                <button onclick="app.toggleSidebar()" class="icon-btn"><i class="fas fa-bars"></i></button>
                <div class="topbar-actions">
                    <button onclick="app.changeFontSize(-2)" class="icon-btn" title="Perkecil Huruf">A-</button>
                    <button onclick="app.changeFontSize(2)" class="icon-btn" title="Perbesar Huruf">A+</button>
                    <button onclick="app.toggleTheme()" class="icon-btn" id="theme-toggle"><i class="fas fa-moon"></i></button>
                    <button onclick="app.logout()" class="icon-btn text-error"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>
            
            <div id="content-area" class="content-container"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
