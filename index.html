<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Jemaat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
    <header>
        <h1>Direktori Jemaat & Kegiatan</h1>
        <nav>
            <button onclick="showSection('jemaat')" class="active" id="btn-jemaat">Data Jemaat</button>
            <button onclick="showSection('kegiatan')" id="btn-kegiatan">Kegiatan Ibadah</button>
        </nav>
    </header>

    <main>
        <section id="jemaat-section">
            <div class="filter-bar">
                <input type="text" id="searchInput" placeholder="Cari nama jemaat..." onkeyup="filterJemaat()">
                <select id="kategoriFilter" onchange="filterJemaat()">
                    <option value="Semua">Semua Kategori</option>
                    <option value="Kaum Saleh">Kaum Saleh</option>
                    <option value="Pemuda">Pemuda</option>
                    <option value="Remaja">Remaja</option>
                    <option value="Anak">Anak-anak</option>
                </select>
            </div>
            <div id="jemaat-grid" class="grid-container">
                <div class="loading">Memuat data dari Google Sheets...</div>
            </div>
        </section>

        <section id="kegiatan-section" style="display: none;">
            <div id="kegiatan-grid" class="grid-container">
                </div>
        </section>
    </main>

    <div id="jemaatModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('jemaatModal')">&times;</span>
            <div id="modal-jemaat-body"></div>
        </div>
    </div>

    <div id="kegiatanModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('kegiatanModal')">&times;</span>
            <div id="modal-kegiatan-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
